name: evsme
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      # --- Core ML / Deep Learning ---
      - torch==2.7.0
      - torchaudio==2.7.0
      - torchvision==0.22.0
      - torchmetrics==1.7.1
      - transformers==4.51.3
      - accelerate==1.6.0
