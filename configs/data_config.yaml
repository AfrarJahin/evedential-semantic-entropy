data_dir: "data"
device: "cpu"
# Set this to an absolute path on your server so weights are downloaded once.
# Override via the HF_HOME env var in ~/.bashrc (recommended).
hf_cache_dir: "hf_cache"

# device_map below was written for OPT (model.decoder.layers.*) and is never
# used for Llama/Mistral/Falcon. accelerate handles placement automatically
# via device_map="auto" in huggingface_models.py.
#
# device_map: {'model.decoder.embed_tokens': 0,
#     'model.decoder.embed_positions': 0,
#     'model.decoder.layers.0': 0,
#     ...
#     'lm_head': 1
# }
